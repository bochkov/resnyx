language: java

jdk:
  - openjdk11

sudo: required

before_install:
  - echo "artifactory_contextUrl=${AR_URL}" >> ~/.gradle/gradle.properties
  - echo "artifactory_user=${AR_USER}" >> ~/.gradle/gradle.properties
  - echo "artifactory_password=${AR_PASSWORD}" >> ~/.gradle/gradle.properties
  - echo "systemProp.sonar.host.url=${SONAR_HOST}" >> ~/.gradle/gradle.properties
  - echo "systemProp.sonar.login=${SONAR_LOGIN}" >> ~/.gradle/gradle.properties

deploy:
  provider: releases
  api_key: ${GH_TOKEN}
  file_glob: true
  file: "build/libs/*.jar"
  skip_cleanup: true
  on:
    tags: true

after_deploy:
  - ./gradlew build
  - ./gradlew sonarqube
  - ./gradlew artifactoryPublish